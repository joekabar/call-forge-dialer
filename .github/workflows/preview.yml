# .github/workflows/preview.yml
# Runs on every pull request — builds frontend and posts a preview URL.
# Lets you review changes before merging to main.

name: PR Preview

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    name: Preview → Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        env:
          VITE_BING_MAPS_KEY: ${{ secrets.VITE_BING_MAPS_KEY }}
          VITE_API_URL:        ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy preview
        uses: amondnet/vercel-action@v25
        id: vercel-preview
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body:  `✅ **Preview deployed:** ${{ steps.vercel-preview.outputs.preview-url }}`
            })
