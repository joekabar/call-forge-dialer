# .github/workflows/deploy.yml
#
# Runs on every push to main:
#   1. Lints and tests both backend and frontend
#   2. Builds Docker images
#   3. Deploys backend to Railway (or swap for Render / Fly.io)
#   4. Deploys frontend to Vercel (or swap for Netlify / Railway)
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   SUPABASE_URL
#   SUPABASE_KEY
#   SUPABASE_ANON_KEY
#   CREDENTIAL_ENCRYPTION_KEY
#   GOOGLE_SOLAR_API_KEY
#   GOOGLE_GEOCODING_KEY
#   WHATSAPP_360DIALOG_KEY
#   VITE_BING_MAPS_KEY
#   RAILWAY_TOKEN            (from railway.app → Account → Tokens)
#   VERCEL_TOKEN             (from vercel.com → Settings → Tokens)
#   VERCEL_ORG_ID
#   VERCEL_PROJECT_ID

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Backend tests ────────────────────────────────────────────
  test-backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint with ruff
        working-directory: backend
        run: |
          pip install ruff
          ruff check . --ignore E501

      - name: Run tests
        working-directory: backend
        env:
          SUPABASE_URL:               ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:               ${{ secrets.SUPABASE_KEY }}
          SUPABASE_ANON_KEY:          ${{ secrets.SUPABASE_ANON_KEY }}
          CREDENTIAL_ENCRYPTION_KEY:  ${{ secrets.CREDENTIAL_ENCRYPTION_KEY }}
        run: |
          pip install pytest httpx
          # pytest tests/ -v   ← uncomment when you add tests
          echo "Tests placeholder — add pytest tests/ when ready"

  # ── Frontend build ───────────────────────────────────────────
  build-frontend:
    name: Frontend — build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_BING_MAPS_KEY: ${{ secrets.VITE_BING_MAPS_KEY }}
          VITE_API_URL:        ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Deploy backend to Railway ────────────────────────────────
  deploy-backend:
    name: Deploy backend → Railway
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service solarflow-backend
        # Railway reads environment variables from the dashboard.
        # Set all your secrets there under:
        # Project → solarflow-backend → Variables

  # ── Deploy frontend to Vercel ────────────────────────────────
  deploy-frontend:
    name: Deploy frontend → Vercel
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args:       '--prod'
